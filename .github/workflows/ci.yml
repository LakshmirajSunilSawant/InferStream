name: InferStream CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ─────────────────────────────────────
  # Lint & Test
  # ─────────────────────────────────────
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install test dependencies
        run: |
          pip install pytest pytest-cov httpx
          pip install -r api/requirements.txt
          pip install -r producer/requirements.txt
          pip install -r flink_jobs/requirements.txt

      - name: Run unit tests
        run: |
          pytest tests/test_producer.py tests/test_features.py \
            -v --tb=short --cov=producer --cov=flink_jobs \
            --cov-report=term-missing

      - name: Run API integration tests
        run: |
          pytest tests/test_api.py -v --tb=short
        env:
          REDIS_URL: redis://localhost:6379
          MLFLOW_TRACKING_URI: http://localhost:5000
          DUCKDB_PATH: /tmp/test.duckdb

  # ─────────────────────────────────────
  # Build Docker Images
  # ─────────────────────────────────────
  docker-build:
    name: 🐳 Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    strategy:
      matrix:
        service: [producer, flink_jobs, api, serving, dashboard]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: false
          tags: inferstream/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────
  # Validate Docker Compose
  # ─────────────────────────────────────
  compose-validate:
    name: 🔍 Validate docker-compose.yml
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # docker compose config requires a .env file to exist because several
      # services declare `env_file: .env`. In CI, .env is gitignored, so we
      # bootstrap a safe copy from the committed template before validating.
      - name: Create .env from template
        run: cp .env.example .env

      - name: Validate docker-compose syntax
        run: docker compose config -q
