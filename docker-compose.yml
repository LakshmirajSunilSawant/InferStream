name: inferstream

# Removed deprecated: version: "3.9"

volumes:
  kafka-data:
  redis-data:
  mlflow-data:
  duckdb-data:
  airflow-data:
  prometheus-data:
  grafana-data:

networks:
  inferstream-net:
    driver: bridge

services:
  # ───────────────────────────────────────────────
  # Apache Kafka (KRaft mode — no ZooKeeper)
  # ───────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: inferstream-kafka
    hostname: kafka
    networks: [inferstream-net]
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"

  # Kafka UI
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: inferstream-kafka-ui
    networks: [inferstream-net]
    ports:
      - "9080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: inferstream
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  # ───────────────────────────────────────────────
  # Redis Stack (online feature store)
  # ───────────────────────────────────────────────
  redis:
    image: redis/redis-stack:latest
    container_name: inferstream-redis
    hostname: redis
    networks: [inferstream-net]
    ports:
      - "6379:6379"
      - "8001:8001"   # RedisInsight
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  # ───────────────────────────────────────────────
  # MLflow Model Registry & Tracking Server
  # ───────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.1
    container_name: inferstream-mlflow
    hostname: mlflow
    networks: [inferstream-net]
    ports:
      - "5000:5000"
    environment:
      MLFLOW_TRACKING_URI: "sqlite:///mlflow.db"
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root /mlflow/artifacts
    volumes:
      - mlflow-data:/mlflow
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  # ───────────────────────────────────────────────
  # Apache Airflow (orchestration)
  # Note: pip install is in the command here for simplicity.
  # For production, build a custom Dockerfile to bake dependencies in.
  # ───────────────────────────────────────────────
  airflow:
    image: apache/airflow:2.9.1
    container_name: inferstream-airflow
    hostname: airflow
    networks: [inferstream-net]
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "sqlite:////opt/airflow/airflow.db"
      MLFLOW_TRACKING_URI: http://mlflow:5000
      REDIS_URL: redis://redis:6379
      DUCKDB_PATH: /data/inferstream.duckdb
    volumes:
      - ./dags:/opt/airflow/dags
      - ./training:/opt/airflow/training
      - ./monitoring:/opt/airflow/monitoring
      - ./feature_store:/opt/airflow/feature_store
      - airflow-data:/opt/airflow
      - duckdb-data:/data
    command: >
      bash -c "
        pip install lightgbm mlflow feast redis duckdb evidently pandas scikit-learn &&
        airflow db migrate &&
        airflow users create --username admin --password inferstream123 --firstname Stream --lastname ML --role Admin --email admin@inferstream.io &&
        airflow webserver --port 8080 &
        airflow scheduler
      "
    depends_on:
      mlflow:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 15s
      retries: 5
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "1.0"

  # ───────────────────────────────────────────────
  # Prometheus (metrics collection)
  # ───────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: inferstream-prometheus
    hostname: prometheus
    networks: [inferstream-net]
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/ready"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  # ───────────────────────────────────────────────
  # Grafana (dashboards)
  # ───────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.3.3
    container_name: inferstream-grafana
    hostname: grafana
    networks: [inferstream-net]
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: inferstream123
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"

  # ───────────────────────────────────────────────
  # Feature Consumer (Kafka → Redis + DuckDB)
  # FIX: DUCKDB_PATH now matches /data/inferstream.duckdb (same as API)
  # ───────────────────────────────────────────────
  feature-consumer:
    build:
      context: ./flink_jobs
      dockerfile: Dockerfile
    container_name: inferstream-feature-consumer
    networks: [inferstream-net]
    env_file: .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL: redis://redis:6379
      DUCKDB_PATH: /data/inferstream.duckdb      # FIX: was /data/features.duckdb
      DUCKDB_BATCH_SIZE: "100"
      DUCKDB_FLUSH_INTERVAL: "10.0"
      FEATURE_COMPUTE_INTERVAL: "0.5"
    volumes:
      - duckdb-data:/data
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  # ───────────────────────────────────────────────
  # Event Producer (live Binance crypto ticks)
  # ───────────────────────────────────────────────
  producer:
    build:
      context: ./producer
      dockerfile: Dockerfile
    container_name: inferstream-producer
    networks: [inferstream-net]
    env_file: .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"

  # ───────────────────────────────────────────────
  # FastAPI Gateway
  # --workers 1 (DuckDB is single-process; async concurrency used instead)
  # ───────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: inferstream-api
    networks: [inferstream-net]
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL: redis://redis:6379
      MLFLOW_TRACKING_URI: http://mlflow:5000
      DUCKDB_PATH: /data/inferstream.duckdb
      DRIFT_REPORT_PATH: /tmp/inferstream_drift_report.json
    volumes:
      - duckdb-data:/data
      - ./feature_store:/app/feature_store
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  # ───────────────────────────────────────────────
  # BentoML Model Server
  # ───────────────────────────────────────────────
  bentoml:
    build:
      context: ./serving
      dockerfile: Dockerfile
    container_name: inferstream-bentoml
    networks: [inferstream-net]
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      REDIS_URL: redis://redis:6379
    volumes:
      - ./feature_store:/app/feature_store
    depends_on:
      mlflow:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"

  # ───────────────────────────────────────────────
  # Streamlit Dashboard
  # ───────────────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: inferstream-dashboard
    networks: [inferstream-net]
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      API_URL: http://api:8000
      REDIS_URL: redis://redis:6379
    depends_on:
      - api
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
