global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # StreamML FastAPI Gateway — exposes /metrics (Prometheus client)
  - job_name: "streamml_api"
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics

  # BentoML Model Server — exposes /metrics if prometheus_client is enabled
  - job_name: "bentoml"
    static_configs:
      - targets: ["bentoml:3000"]
    metrics_path: /metrics

  # Prometheus self-scrape
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # NOTE: Kafka (9092) and Redis (6379) do NOT expose /metrics by default.
  # To scrape them, deploy dedicated exporters:
  #   kafka:  kafka-exporter (port 9308)  https://github.com/danielqsj/kafka_exporter
  #   redis:  redis-exporter (port 9121)  https://github.com/oliver006/redis_exporter
  #
  # Uncomment below once exporters are deployed:
  #
  # - job_name: "kafka_exporter"
  #   static_configs:
  #     - targets: ["kafka-exporter:9308"]
  #
  # - job_name: "redis_exporter"
  #   static_configs:
  #     - targets: ["redis-exporter:9121"]
